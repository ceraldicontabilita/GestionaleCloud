<!-- @dsCard group="Type" viewport="700x180" name="Scala UI" subtitle="System sans · 11→24px · densità controllata" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--c-card); color: var(--c-text); padding: 16px; }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--gray-100); }
  .tag { width: 64px; font-family: var(--font-mono); font-size: 10px; color: var(--c-text-subtle); flex-shrink: 0; }
  .spec { color: var(--c-text); }
</style>
</head>
<body>
  <div class="line"><span class="tag">24 / 700</span><span class="spec" style="font-size:24px;font-weight:700;letter-spacing:-0.3px">€ 184.920 — Valore KPI</span></div>
  <div class="line"><span class="tag">20 / 700</span><span class="spec" style="font-size:20px;font-weight:700;letter-spacing:-0.3px">Titolo Pagina</span></div>
  <div class="line"><span class="tag">14 / 700</span><span class="spec" style="font-size:14px;font-weight:700;color:var(--c-primary)">Titolo Card</span></div>
  <div class="line"><span class="tag">13 / 400</span><span class="spec" style="font-size:13px">Corpo del testo e celle tabella — base 13px</span></div>
  <div class="line"><span class="tag">12 / 600</span><span class="spec" style="font-size:12px;font-weight:600;color:var(--c-text-muted)">Meta / sottotitolo / caption</span></div>
  <div class="line" style="border:0"><span class="tag">11 / 700</span><span class="spec" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--c-text-muted)">Intestazione Colonna</span></div>
</body>
</html>
