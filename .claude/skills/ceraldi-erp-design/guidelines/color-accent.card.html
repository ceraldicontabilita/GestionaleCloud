<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Oro" subtitle="Gold accent — used sparingly for emphasis" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--c-card); color: var(--c-text); }
  .row { display: flex; gap: 10px; padding: 16px; flex-wrap: wrap; align-items: flex-start; }
  .sw { width: 150px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--c-border); }
  .chip { height: 58px; }
  .meta { padding: 7px 9px; }
  .name { font-size: 12px; font-weight: 700; }
  .hex { font-size: 11px; color: var(--c-text-muted); font-family: var(--font-mono); margin-top: 2px; }
  .note { max-width: 220px; font-size: 12px; color: var(--c-text-muted); line-height: 1.5; padding-top: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--c-accent)"></div><div class="meta"><div class="name">Accent</div><div class="hex">#b8860b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--c-accent-light)"></div><div class="meta"><div class="name">Accent Light</div><div class="hex">#d4a017</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--c-accent-soft)"></div><div class="meta"><div class="name">Accent Soft</div><div class="hex">#fdf6e3</div></div></div>
    <p class="note">Oro sobrio. Riservato a evidenziazioni e badge "attenzione" — mai dominante.</p>
  </div>
</body>
</html>
