<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Navy" subtitle="Primary navy scale + soft tint" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--c-card); color: var(--c-text); }
  .row { display: flex; gap: 10px; padding: 16px; flex-wrap: wrap; }
  .sw { width: 150px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--c-border); }
  .chip { height: 58px; }
  .meta { padding: 7px 9px; }
  .name { font-size: 12px; font-weight: 700; }
  .hex { font-size: 11px; color: var(--c-text-muted); font-family: var(--font-mono); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--c-primary-dark)"></div><div class="meta"><div class="name">Primary Dark</div><div class="hex">#081425</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--c-primary)"></div><div class="meta"><div class="name">Primary</div><div class="hex">#0f2744</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--c-primary-light)"></div><div class="meta"><div class="name">Primary Light</div><div class="hex">#1e3a5f</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--c-primary-soft)"></div><div class="meta"><div class="name">Primary Soft</div><div class="hex">#e8eef7</div></div></div>
  </div>
</body>
</html>
