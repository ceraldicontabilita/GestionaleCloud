<!-- @dsCard group="Spacing" viewport="700x150" name="Scala 4px" subtitle="xs 4 · sm 8 · md 12 · lg 16 · xl 20 · 2xl 24 · 3xl 32" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-ui); background: var(--c-card); color: var(--c-text); padding: 18px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--c-primary); border-radius: 3px; width: 100%; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--c-text-muted); margin-top: 6px; }
  .nm { font-size: 11px; font-weight: 700; margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px;width:4px"></div><div class="nm">xs</div><div class="tag">4</div></div>
    <div class="item"><div class="bar" style="height:8px;width:8px"></div><div class="nm">sm</div><div class="tag">8</div></div>
    <div class="item"><div class="bar" style="height:12px;width:12px"></div><div class="nm">md</div><div class="tag">12</div></div>
    <div class="item"><div class="bar" style="height:16px;width:16px"></div><div class="nm">lg</div><div class="tag">16</div></div>
    <div class="item"><div class="bar" style="height:20px;width:20px"></div><div class="nm">xl</div><div class="tag">20</div></div>
    <div class="item"><div class="bar" style="height:24px;width:24px"></div><div class="nm">2xl</div><div class="tag">24</div></div>
    <div class="item"><div class="bar" style="height:32px;width:32px"></div><div class="nm">3xl</div><div class="tag">32</div></div>
  </div>
</body>
</html>
