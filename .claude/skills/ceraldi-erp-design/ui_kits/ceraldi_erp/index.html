<!-- @startingPoint section="Ceraldi ERP" subtitle="App ERP completa: nav, dashboard, tabella dati" viewport="1280x720" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ceraldi ERP</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body, #root { margin: 0; height: 100%; }
  body { font-family: var(--font-ui); background: var(--c-bg); color: var(--c-text); font-size: 13px; -webkit-font-smoothing: antialiased; }
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; color: var(--c-text-subtle); text-align: center; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="TopNav.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="CorrispettiviScreen.jsx"></script>
<script type="text/babel">
  function App() {
    const [logged, setLogged] = React.useState(false);
    const [page, setPage] = React.useState('dashboard');
    const Icon = window.Icon;

    if (!logged) return <window.LoginScreen onLogin={() => setLogged(true)} />;

    let body;
    if (page === 'dashboard') body = <window.DashboardScreen />;
    else if (page === 'corrispettivi') body = <window.CorrispettiviScreen />;
    else body = (
      <div className="placeholder">
        <Icon name="construction" size={36} color="var(--c-text-subtle)" />
        <div style={{ fontWeight: 700, color: 'var(--c-text-muted)', fontSize: 15 }}>Modulo "{page}"</div>
        <div style={{ fontSize: 13 }}>Schermata non inclusa in questo UI kit dimostrativo.<br/>Vedi Dashboard e Corrispettivi per il pattern completo.</div>
      </div>
    );

    return (
      <div style={{ minHeight: '100vh' }}>
        <window.TopNav active={page} onNavigate={setPage} />
        <div style={{ padding: '16px 24px 48px', maxWidth: 1440, margin: '0 auto' }}>{body}</div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
